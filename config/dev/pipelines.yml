pipeline:
  name: "Centralized Data Pipeline"
  version: "1.0.0"
  description: "ETL pipeline with joins — sources: MySQL to DataFrame"

# Example 1: Simple join
fg_customer_with_orders:
  feedname: fg_customer_with_orders
  developer: bai
  sources:
    id: customer
    type: mysql
    connection: mysql_main
    query: "SELECT * FROM users"
  filter: "waktu_daftar.notna()"
  joins:
    - type: "left"
      on: "customer_id"
      source:
        id: orders
        type: mysql
        connection: mysql_main
        query: "SELECT * FROM orders"

# Example 2: Multiple joins
fg_customer_orders_payments:
  feedname: fg_customer_orders_payments
  developer: bai
  sources:
    id: customer
    type: mysql
    connection: mysql_main
    query: "SELECT id, name, email FROM users"
  filter: "email.notna()"
  joins:
    # First join: customers with orders
    - type: "left"
      on: "id"
      suffix: ("_customer", "_order")
      source:
        id: orders
        type: mysql
        connection: mysql_main
        query: "SELECT * FROM orders WHERE status = 'completed'"
    # Second join: add payment information
    - type: "inner"
      left_on: "order_id"
      right_on: "id"
      source:
        id: payments
        type: mysql
        connection: mysql_main
        query: "SELECT * FROM payments"

# Example 3: Join with different column names
fg_orders_with_customer_details:
  feedname: fg_orders_with_customer_details
  developer: bai
  sources:
    id: orders
    type: mysql
    connection: mysql_main
    query: "SELECT * FROM orders"
  filter: "status == 'active'"
  joins:
    - type: "left"
      left_on: "customer_id"
      right_on: "id"
      suffix: ("_order", "_customer")
      source:
        id: customer
        type: mysql
        connection: mysql_main
        query: "SELECT * FROM users"

fg_customer:
  feedname: fg_customer
  developer: bai
  sources:
    id: customer
    type: mysql
    connection: mysql_main
    query: "SELECT * FROM users"
  filter: "waktu_daftar.notna()"

fg_orders:
  feedname: fg_orders
  developer: bai
  sources:
    id: orders
    type: mysql
    connection: mysql_main
    query: "SELECT * FROM orders"
  filter: "status == 'active'"